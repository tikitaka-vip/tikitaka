  </text>

  <!-- Feature pills -->
  <g transform="translate(540, 320)">
    <rect x="0" y="0" width="140" height="34" rx="8" fill="rgba(201,162,39,0.15)" stroke="#c9a227" stroke-width="1"/>
    <text x="70" y="23" font-family="'Heebo', 'Arial', sans-serif" font-weight="700" font-size="16" fill="#c9a227" text-anchor="middle">104 matches</text>
    <rect x="155" y="0" width="160" height="34" rx="8" fill="rgba(201,162,39,0.15)" stroke="#c9a227" stroke-width="1"/>
    <text x="235" y="23" font-family="'Heebo', 'Arial', sans-serif" font-weight="700" font-size="16" fill="#c9a227" text-anchor="middle">surprise = 8x pts</text>
    <rect x="330" y="0" width="120" height="34" rx="8" fill="rgba(201,162,39,0.15)" stroke="#c9a227" stroke-width="1"/>
    <text x="390" y="23" font-family="'Heebo', 'Arial', sans-serif" font-weight="700" font-size="16" fill="#c9a227" text-anchor="middle">free to play</text>
  </g>

  <!-- CTA -->
  <rect x="540" y="400" width="300" height="54" rx="12" fill="#c9a227"/>
  <text x="690" y="435" font-family="'Heebo', 'Arial', sans-serif" font-weight="800" font-size="24" fill="#0a0e17" text-anchor="middle">tikitaka.vip — !הצטרפו</text>

  <!-- Bottom text -->
  <text x="600" y="560" font-family="'Heebo', 'Arial', sans-serif" font-weight="400" font-size="18" fill="#4a5568" text-anchor="middle">
