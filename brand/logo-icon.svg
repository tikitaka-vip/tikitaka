<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="furDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </linearGradient>
    <linearGradient id="furLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A76A"/>
      <stop offset="100%" stop-color="#C4935A"/>
    </linearGradient>
  </defs>

  <!-- Gold circle background -->
  <circle cx="256" cy="256" r="250" fill="#c9a227"/>
  <!-- Navy inner circle -->
  <circle cx="256" cy="256" r="232" fill="url(#bgGrad)"/>

  <!-- MONKEY HEAD -->
  <!-- Ears outer -->
  <circle cx="128" cy="220" r="62" fill="url(#furDark)"/>
  <circle cx="384" cy="220" r="62" fill="url(#furDark)"/>
  <!-- Ears inner -->
  <circle cx="128" cy="220" r="40" fill="url(#furLight)"/>
  <circle cx="384" cy="220" r="40" fill="url(#furLight)"/>

  <!-- Head shape (fur) -->
  <ellipse cx="256" cy="260" rx="150" ry="160" fill="url(#furDark)"/>

  <!-- Face (lighter area) -->
  <ellipse cx="256" cy="290" rx="115" ry="120" fill="url(#furLight)"/>

  <!-- Brow ridge -->
  <path d="M150 220 Q200 180 256 185 Q312 180 362 220 Q312 195 256 200 Q200 195 150 220Z" fill="#6B4226"/>

  <!-- Eyes - white -->
  <ellipse cx="210" cy="245" rx="32" ry="35" fill="#FFFFFF"/>
  <ellipse cx="302" cy="245" rx="32" ry="35" fill="#FFFFFF"/>

  <!-- Eyes - iris (dark brown) -->
  <circle cx="215" cy="248" r="18" fill="#2C1810"/>
  <circle cx="307" cy="248" r="18" fill="#2C1810"/>

  <!-- Eyes - pupil -->
  <circle cx="218" cy="245" r="9" fill="#000000"/>
  <circle cx="310" cy="245" r="9" fill="#000000"/>

  <!-- Eyes - shine -->
  <circle cx="222" cy="240" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="314" cy="240" r="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Nose/mouth area -->
  <ellipse cx="256" cy="330" rx="70" ry="55" fill="#C4935A"/>

  <!-- Nostrils -->
  <ellipse cx="237" cy="318" rx="10" ry="8" fill="#6B4226"/>
  <ellipse cx="275" cy="318" rx="10" ry="8" fill="#6B4226"/>

  <!-- Mouth - cheeky smile -->
  <path d="M218 345 Q237 368 256 365 Q275 368 294 345" stroke="#6B4226" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Gold crown/star on head -->
  <g transform="translate(256,130)">
    <polygon points="0,-32 8,-12 28,-12 12,2 18,22 0,10 -18,22 -12,2 -28,-12 -8,-12" fill="#c9a227"/>
  </g>
</svg>
