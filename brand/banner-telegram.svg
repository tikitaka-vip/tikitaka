<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="furDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </linearGradient>
    <linearGradient id="furLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A76A"/>
      <stop offset="100%" stop-color="#C4935A"/>
    </linearGradient>
    <pattern id="stars" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 5L35 20 50 20 38 30 42 45 30 35 18 45 22 30 10 20 25 20Z" fill="rgba(201,162,39,0.06)"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#headerBg)"/>
  <rect width="1280" height="640" fill="url(#stars)"/>
  <rect x="16" y="16" width="1248" height="608" rx="12" fill="none" stroke="#c9a227" stroke-width="2.5"/>

  <!-- Monkey left -->
  <g transform="translate(60,80) scale(0.45)">
    <circle cx="256" cy="256" r="250" fill="#c9a227"/>
