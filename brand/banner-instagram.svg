  </g>

  <!-- Question -->
  <text x="540" y="630" font-family="'Heebo', 'Arial', sans-serif" font-weight="900" font-size="40" fill="#c9a227" text-anchor="middle" direction="rtl">?אתם יכולים לנצח אותו</text>

