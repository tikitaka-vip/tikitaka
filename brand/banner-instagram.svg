    <linearGradient id="furLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A76A"/>
      <stop offset="100%" stop-color="#C4935A"/>
    </linearGradient>
    <pattern id="stars" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 5L35 20 50 20 38 30 42 45 30 35 18 45 22 30 10 20 25 20Z" fill="rgba(201,162,39,0.06)"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#headerBg)"/>
  <rect width="1080" height="1080" fill="url(#stars)"/>
  <rect x="24" y="24" width="1032" height="1032" rx="16" fill="none" stroke="#c9a227" stroke-width="3"/>

