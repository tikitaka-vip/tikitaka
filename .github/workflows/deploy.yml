name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 64.177.65.238
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/worldcup
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            systemctl restart worldcup
            sleep 2
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/stats | grep -q 200 && echo "Deploy OK" || echo "Deploy FAILED"
